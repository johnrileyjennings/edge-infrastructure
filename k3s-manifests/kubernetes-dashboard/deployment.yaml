apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: kubernetes-dashboard
spec:
  interval: 2h
  url: https://kubernetes-sigs.github.io/headlamp/ # Modern, active upstream repo
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: kubernetes-dashboard
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: "0.42.0" # Latest stable release range
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: kubernetes-dashboard
  values:
    # Force Headlamp pods onto your Raspberry Pi worker
    nodeSelector:
      kubernetes.io/hostname: rasppi

    # Expose the new UI under your domain map
    ingress:
      enabled: true
      hosts:
        - host: lamp.eternallyzer0.com
          paths:
            - path: /
              type: ImplementationSpecific
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
