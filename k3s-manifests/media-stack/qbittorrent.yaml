apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3shost # Set working node to master control plane
      containers:
        # --- CONTAINER 1: GLUETUN CUSTOM WIREGUARD ---
        - name: gluetun
          image: qmcgaw/gluetun:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            allowPrivilageEscalation: true
          ports:
            - containerPort: 8080
              name: webui
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "wireguard"
            - name: FIREWALL
              value: "on"
            # Allows local cluster traffic and home LAN routing to access the interface
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16,192.168.1.0/24"
            # Enable native NAT-PMP port forwarding
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_PROVIDER
              value: "protonvpn"
            # Pull keys dynamically from protonvpn-wg secret
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: private_key
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: addresses
            - name: WIREGUARD_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: public_key
            - name: VPN_ENDPOINT_IP
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: endpoint_ip
            - name: VPN_ENDPOINT_PORT
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: endpoint_port
          volumeMounts:
            - mountPath: /tmp/gluetun
              name: shared-gluetun-data

        # --- CONTAINER 2: QBITTORRENT WITH AUTO-PORT UPDATE ---
        - name: qbittorrent
          image: linuxserver/qbittorrent:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
            - name: WEBUI_PORT
              value: "8080"
          volumeMounts:
            - mountPath: /config
              name: qbit-config
            - mountPath: /data
              name: media-storage # Mounted to 1TB drive
            - mountPath: /tmp/gluetun
              name: shared-gluetun-data
              readOnly: true
          # This internal shell command runs alongside booting to watch the port file
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    while [ ! -f /tmp/gluetun/forwarded_port ]; do sleep 2; done;
                    while true; do
                      PORT=$(cat /tmp/gluetun/forwarded_port)
                      if [ ! -z "$PORT" ]; then
                        # Uses qBittorrent API to set listening port dynamically
                        curl -s -X POST "http://localhost:8080/api/v2/app/setPreferences" --data-urlencode "json={\"listen_port\":$PORT}"
                      fi
                      sleep 300
                    done &
      volumes:
        - name: qbit-config
          persistentVolumeClaim:
            claimName: qbit-config-pvc
        - name: shared-gluetun-data
          emptyDir: {} # Temporary in-memory bridge between containers
        - name: media-storage
          hostPath:
            path: /mnt/media-storage/data # Points straight to the 1TB physical disk mount
            type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbit-config-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: webui
  selector:
    app: qbittorrent
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent
  namespace: media
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: qbit.${root_domain}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qbittorrent
                port:
                  number: 8080
