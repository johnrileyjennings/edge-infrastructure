apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  replicas: 1
  strategy:
    type: Recreate # Clean teardown prevents dead volume state loops across restarts
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3shost
      containers:
        # --- CONTAINER 1: GLUETUN CUSTOM WIREGUARD VPN GATEWAY ---
        - name: gluetun
          image: qmcgaw/gluetun:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN # Mandatory for container-level routing & iptables management
          ports:
            - containerPort: 8080
              name: webui # Exposed endpoint targeted by the Kubernetes Service
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "wireguard"
            - name: FIREWALL
              value: "on"
            # Explicitly open inbound paths for local cluster tracking and home networking
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16,10.86.86.0/24"
            # Open direct local firewall holes for the application runtime listener
            - name: FIREWALL_INPUT_PORTS
              value: "8080"
            # Whispers to the ProtonVPN endpoint every 25s to stop pfSense from dropping the UDP state entry
            - name: WIREGUARD_PERSISTENT_KEEPALIVE
              value: "25"
            # Explicit management interface definition to prevent random fallback binding collisions
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8000"
            # Modern environment parameters to suppress standard startup engine validation errors
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: private_key
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: addresses
            - name: WIREGUARD_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: public_key
            - name: WIREGUARD_ENDPOINT_IP
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: endpoint_ip
            - name: WIREGUARD_ENDPOINT_PORT
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: endpoint_port
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_PROVIDER
              value: "protonvpn"
          volumeMounts:
            - mountPath: /tmp/gluetun
              name: shared-gluetun-data

        # --- CONTAINER 2: QBITTORRENT CLIENT ---
        - name: qbittorrent
          image: linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
            - name: WEBUI_PORT
              value: "8080" # Binds directly to localhost:8080 inside the shared pod network
          volumeMounts:
            - mountPath: /config
              name: qbit-config
            - mountPath: /data
              name: media-storage
            - mountPath: /tmp/gluetun
              name: shared-gluetun-data
              readOnly: true
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    (
                    while [ ! -f /tmp/gluetun/forwarded_port ]; do sleep 2; done;
                    while true; do
                      PORT=$(cat /tmp/gluetun/forwarded_port)
                      if [ ! -z "$PORT" ]; then
                        curl -s -X POST "http://localhost:8080/api/v2/app/setPreferences" --data-urlencode "json={\"listen_port\":$PORT}"
                      fi
                      sleep 300
                    done
                    ) >/dev/null 2>&1 &

      # --- SHARED VOLUMES DECLARATION ---
      volumes:
        - name: shared-gluetun-data
          emptyDir: {} # Ephemeral memory pool holding the active 'forwarded_port' reference
        - name: qbit-config
          persistentVolumeClaim:
            claimName: qbit-config-pvc
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-storage-pvc
